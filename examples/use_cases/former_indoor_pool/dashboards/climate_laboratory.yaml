# =============================================================================
# SHCCF Climate Laboratory V2 – Former Indoor Pool
# =============================================================================
# Experimental dashboard for moisture-source analysis.
# This use-case dashboard is not part of the SHCF/SHCCF core.
# =============================================================================

title: SHCCF Climate Laboratory

views:
  - title: Overview
    path: overview
    icon: mdi:view-dashboard-outline
    type: sections
    max_columns: 4

    header:
      card:
        type: markdown
        text_only: true
        content: |
          # SHCCF Climate Laboratory
          Former Indoor Pool – Overview
      layout: start
      badges_position: bottom
      badges_wrap: wrap

    badges:
      - type: entity
        entity: input_select.shccf_lab_experiment_phase
        name: Phase
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: sensor.shcf_klimasensor_temperature
        name: Temperature
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: sensor.shcf_klimasensor_humidity
        name: Humidity
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: sensor.shccf_lab_pool_absolute_humidity
        name: Absolute Humidity
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: sensor.shccf_lab_pool_dew_point
        name: Dew Point
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: sensor.shcf_device_62e90919_operating_status_display
        name: Dehumidifier
        show_name: true
        show_state: true
        show_icon: false

    sections:
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Climate Conditions
            heading_style: title
            icon: mdi:home-thermometer-outline

          - type: entities
            title: Former Indoor Pool
            show_header_toggle: false
            entities:
              - entity: sensor.shcf_klimasensor_temperature
                name: Temperature
              - entity: sensor.shcf_klimasensor_humidity
                name: Relative Humidity
              - entity: sensor.shccf_lab_pool_dew_point
                name: Dew Point
              - entity: sensor.shccf_lab_pool_absolute_humidity
                name: Absolute Humidity

          - type: entities
            title: Humidity Differences
            show_header_toggle: false
            entities:
              - entity: sensor.shccf_lab_fitness_room_minus_pool_absolute_humidity
                name: Fitness Room minus Pool
              - entity: sensor.shccf_lab_outdoor_south_west_minus_pool_absolute_humidity
                name: Outdoor South-West minus Pool
              - entity: sensor.shccf_lab_outdoor_north_east_minus_pool_absolute_humidity
                name: Outdoor North-East minus Pool

          - type: entities
            title: SHCCF Controller
            show_header_toggle: false
            entities:
              - entity: input_select.shcf_device_62e90919_operating_mode
                name: Operating Mode
              - entity: sensor.shcf_device_62e90919_operating_status_display
                name: Controller Status
              - entity: sensor.shcf_device_62e90919_target_humidity
                name: Target Humidity
              - entity: sensor.shcf_device_62e90919_switch_on_threshold
                name: Start Threshold
              - entity: sensor.shcf_device_62e90919_dehumidification_demand
                name: Dehumidification Demand

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Today's Analytics
            heading_style: title
            icon: mdi:chart-box-outline

          - type: tile
            entity: sensor.shccf_lab_trotec_runtime_today
            name: Runtime
            vertical: false
          - type: tile
            entity: sensor.shccf_lab_trotec_energy_today
            name: Energy
            vertical: false
          - type: tile
            entity: sensor.shccf_lab_pool_time_above_60_today
            name: Exposure
            vertical: false
          - type: tile
            entity: sensor.shcf_device_62e90919_operating_status_display
            name: Current Status
            vertical: false

          - type: entities
            title: Indoor Humidity
            show_header_toggle: false
            entities:
              - entity: sensor.shccf_lab_pool_humidity_minimum_24h
                name: Minimum
              - entity: sensor.shccf_lab_pool_humidity_mean_24h
                name: Mean
              - entity: sensor.shccf_lab_pool_humidity_maximum_24h
                name: Maximum

          - type: entities
            title: Indoor Absolute Humidity
            show_header_toggle: false
            entities:
              - entity: sensor.shccf_lab_pool_absolute_humidity_minimum_24h
                name: Minimum
              - entity: sensor.shccf_lab_pool_absolute_humidity_mean_24h
                name: Mean
              - entity: sensor.shccf_lab_pool_absolute_humidity_maximum_24h
                name: Maximum

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: 24-Hour History
            heading_style: title
            icon: mdi:chart-line

          - type: history-graph
            title: Indoor Humidity and SHCCF Thresholds
            hours_to_show: 24
            logarithmic_scale: false
            entities:
              - entity: sensor.shcf_klimasensor_humidity
                name: Indoor Humidity
              - entity: sensor.shcf_device_62e90919_target_humidity
                name: Target
              - entity: sensor.shcf_device_62e90919_switch_on_threshold
                name: Start Threshold

          - type: history-graph
            title: Absolute Humidity
            hours_to_show: 24
            logarithmic_scale: false
            entities:
              - entity: sensor.shccf_lab_pool_absolute_humidity
                name: Former Indoor Pool
              - entity: sensor.shccf_lab_fitness_room_absolute_humidity
                name: Fitness Room
              - entity: sensor.shccf_lab_outdoor_south_west_absolute_humidity
                name: Outdoor South-West
              - entity: sensor.shccf_lab_outdoor_north_east_absolute_humidity
                name: Outdoor North-East

          - type: history-graph
            title: Dehumidifier Power
            hours_to_show: 24
            logarithmic_scale: false
            entities:
              - entity: sensor.shcf_zwischenstecker_power
                name: Power

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Experiment Summary
            heading_style: title
            icon: mdi:flask-outline

          - type: entities
            title: Current Experiment
            show_header_toggle: false
            entities:
              - entity: input_text.shccf_lab_experiment_name
                name: Experiment Name
              - entity: sensor.shccf_lab_experiment_status
                name: Status
              - entity: input_select.shccf_lab_experiment_phase
                name: Phase
              - entity: input_text.shccf_lab_primary_measurement_location
                name: Primary Measurement Location
              - entity: input_datetime.shccf_lab_experiment_started
                name: Started
              - entity: sensor.shccf_lab_experiment_duration
                name: Duration
              - entity: sensor.shccf_lab_experiment_energy_used
                name: Energy Used
              - entity: input_text.shccf_lab_current_investigation_action
                name: Current Investigation

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Operational Timeline
            heading_style: title
            icon: mdi:timeline-clock-outline

          - type: custom:timeline-card
            title: Recent Events
            hours: 24
            limit: 20
            visible_events: 8
            overflow: collapse
            relative_time: true
            show_names: true
            show_states: true
            show_icons: true
            allow_multiline: true
            collapse_duplicates: true
            collapse_duplicates_keep: latest
            language: en-GB
            refresh_interval: 60
            entities:
              - entity: input_select.shccf_lab_experiment_phase
                name: Experiment Phase
                icon: mdi:flask-outline
              - entity: input_select.shcf_device_62e90919_operating_mode
                name: Operating Mode
                icon: mdi:tune-variant
              - entity: sensor.shcf_device_62e90919_operating_status
                name: Controller Status
                icon: mdi:air-humidifier
              - entity: binary_sensor.shccf_lab_trotec_running
                name: Dehumidifier
                icon_map:
                  "on": mdi:play-circle
                  "off": mdi:stop-circle
                state_map:
                  "on": Running
                  "off": Stopped
              - entity: binary_sensor.shccf_lab_pool_humidity_above_60
                name: Humidity Exposure
                icon_map:
                  "on": mdi:water-percent-alert
                  "off": mdi:water-check
                state_map:
                  "on": Elevated
                  "off": Normal

    cards: []

  - title: Measurements
    path: measurements
    icon: mdi:gauge
    type: sections
    max_columns: 4

    header:
      card:
        type: markdown
        text_only: true
        content: |
          # Measurements
          Detailed values from all climate measurement locations
      layout: start
      badges_position: bottom
      badges_wrap: wrap

    sections:
      - type: grid
        column_span: 4
        cards:
