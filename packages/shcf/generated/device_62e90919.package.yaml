input_select:
  shcf_device_62e90919_operating_mode:
    name: SHCF device_62e90919 Operating Mode
    options:
      - "Off"
      - "Automatic"
      - "Continuous Operation"
      - "Timed Operation"
    initial: "Off"

  shcf_device_62e90919_humidity_profile:
    name: SHCF device_62e90919 Humidity Profile
    options:
      - "Living Room"
      - "Bedroom"
      - "Basement"
      - "Unheated Basement"
      - "Pool Room"
      - "Desert"
      - "Custom"
    initial: "Custom"

  shcf_device_62e90919_control_characteristic:
    name: SHCF device_62e90919 Control Characteristic
    options:
      - "Standard"
      - "Comfort"
      - "Protective"
      - "Energy Saving"
    initial: "Standard"

  shcf_device_62e90919_target_mode:
    name: SHCF device_62e90919 Target Mode
    options:
      - "Humidity Profile"
      - "Custom Target"
    initial: "Custom Target"

  shcf_device_62e90919_timed_operation_behavior_on_target_reached:
    name: SHCF device_62e90919 Timed Operation Behavior on Target Reached
    options:
      - "Continue Until Timer Ends"
      - "Switch to Automatic"
      - "Turn Off"
    initial: "Switch to Automatic"

input_number:
  shcf_device_62e90919_custom_target_humidity:
    name: SHCF device_62e90919 Custom Target Humidity
    min: 35
    max: 75
    step: 1
    unit_of_measurement: "%"
    mode: slider
    initial: 60

  shcf_device_62e90919_hysteresis:
    name: SHCF device_62e90919 Hysteresis
    min: 1
    max: 15
    step: 1
    unit_of_measurement: "%"
    mode: slider
    initial: 5

  shcf_device_62e90919_timed_operation_duration:
    name: SHCF device_62e90919 Timed Operation Duration
    min: 5
    max: 720
    step: 5
    unit_of_measurement: "min"
    mode: box
    initial: 60

timer:
  shcf_device_62e90919_timed_operation:
    name: SHCF device_62e90919 Timed Operation

template:
  - sensor:
      - name: SHCF device_62e90919 Current Humidity
        unique_id: shcf_device_62e90919_current_humidity
        unit_of_measurement: "%"
        state: >
          {{ states('sensor.shcf_klimasensor_humidity') | float(0) | round(1) }}

      - name: SHCF device_62e90919 Current Temperature
        unique_id: shcf_device_62e90919_current_temperature
        unit_of_measurement: "°C"
        state: >
          {{ states('sensor.shcf_klimasensor_temperature') | float(0) | round(1) }}

      - name: SHCF device_62e90919 Target Humidity
        unique_id: shcf_device_62e90919_target_humidity
        unit_of_measurement: "%"
        state: >
          {{
            states(
              'input_number.shcf_device_62e90919_custom_target_humidity'
            ) | float(60) | round(1)
          }}

      - name: SHCF device_62e90919 Hysteresis
        unique_id: shcf_device_62e90919_hysteresis
        unit_of_measurement: "%"
        state: >
          {{
            states(
              'input_number.shcf_device_62e90919_hysteresis'
            ) | float(5) | round(1)
          }}

      - name: SHCF device_62e90919 Switch-on Threshold
        unique_id: shcf_device_62e90919_switch_on_threshold
        unit_of_measurement: "%"
        state: >
          {% set target =
            states('sensor.shcf_device_62e90919_target_humidity') | float(60)
          %}
          {% set hysteresis =
            states('sensor.shcf_device_62e90919_hysteresis') | float(5)
          %}
          {{ (target + hysteresis) | round(1) }}

      - name: SHCF device_62e90919 Target Humidity Lower Limit
        unique_id: shcf_device_62e90919_target_humidity_lower_limit
        unit_of_measurement: "%"
        state: >
          {{
            states(
              'sensor.shcf_device_62e90919_target_humidity'
            ) | float(60) | round(1)
          }}

      - name: SHCF device_62e90919 Target Humidity Upper Limit
        unique_id: shcf_device_62e90919_target_humidity_upper_limit
        unit_of_measurement: "%"
        state: >
          {{
            states(
              'sensor.shcf_device_62e90919_switch_on_threshold'
            ) | float(65) | round(1)
          }}

      - name: SHCF device_62e90919 Target Humidity Deviation
        unique_id: shcf_device_62e90919_target_humidity_deviation
        unit_of_measurement: "%"
        state: >
          {% set current =
            states('sensor.shcf_klimasensor_humidity') | float(0)
          %}
          {% set target =
            states('sensor.shcf_device_62e90919_target_humidity') | float(60)
          %}
          {{ (current - target) | round(2) }}

      - name: SHCF device_62e90919 Indoor Dew Point
        unique_id: shcf_device_62e90919_indoor_dew_point
        unit_of_measurement: "°C"
        state: >
          {% set temperature =
            states('sensor.shcf_klimasensor_temperature') | float(0)
          %}
          {% set humidity =
            states('sensor.shcf_klimasensor_humidity') | float(0)
          %}
          {{
            (
              temperature - ((100 - humidity) / 5)
            ) | round(1)
          }}

      - name: SHCF device_62e90919 Dehumidification Demand
        unique_id: shcf_device_62e90919_dehumidification_demand
        state: >
          {% set humidity = states('sensor.shcf_klimasensor_humidity') | float(0) %}
          {% set target = states('sensor.shcf_device_62e90919_target_humidity') | float(60) %}
          {% set threshold = states('sensor.shcf_device_62e90919_switch_on_threshold') | float(65) %}
          {% if humidity <= target %}
            none
          {% elif humidity > threshold %}
            high
          {% else %}
            moderate
          {% endif %}

      - name: SHCF device_62e90919 Operating Status
        unique_id: shcf_device_62e90919_operating_status
        state: >
          {% set mode = states('input_select.shcf_device_62e90919_operating_mode') %}
          {% set switch_state = states('switch.shcf_zwischenstecker') %}
          {% if mode == 'Off' %}
            Off
          {% elif mode == 'Continuous Operation' %}
            Continuous Operation
          {% elif mode == 'Timed Operation' %}
            Timed Operation
          {% elif mode == 'Automatic' and switch_state == 'on' %}
            Automatic Dehumidifying
          {% elif mode == 'Automatic' %}
            Automatic Standby
          {% else %}
            Unknown
          {% endif %}

      - name: SHCF device_62e90919 Operating Status Display
        unique_id: shcf_device_62e90919_operating_status_display
        state: >
          {% set status = states('sensor.shcf_device_62e90919_operating_status') %}
          {% if status == 'Off' %}
            ⏹ Off
          {% elif status == 'Continuous Operation' %}
            🔁 Continuous Operation
          {% elif status == 'Timed Operation' %}
            ⏱ Timed Operation
          {% elif status == 'Automatic Dehumidifying' %}
            💧 Automatic Dehumidifying
          {% elif status == 'Automatic Standby' %}
            🟢 Automatic Standby
          {% else %}
            ❔ Unknown
          {% endif %}

      - name: SHCF device_62e90919 Recommendation
        unique_id: shcf_device_62e90919_recommendation
        state: >
          {% set demand = states('sensor.shcf_device_62e90919_dehumidification_demand') %}
          {% if demand == 'high' %}
            Dehumidification recommended.
          {% elif demand == 'moderate' %}
            Humidity is above target range.
          {% else %}
            Humidity is within target range.
          {% endif %}

automation:
  - id: shcf_device_62e90919_controller
    alias: SHCF device_62e90919 Controller
    mode: restart

    trigger:
      - platform: time_pattern
        minutes: "/5"

      - platform: state
        entity_id:
          - sensor.shcf_klimasensor_humidity
          - input_select.shcf_device_62e90919_operating_mode
          - input_number.shcf_device_62e90919_custom_target_humidity
          - input_number.shcf_device_62e90919_hysteresis
          - input_number.shcf_device_62e90919_timed_operation_duration

      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.shcf_device_62e90919_timed_operation

    variables:
      mode_state: "{{ states('input_select.shcf_device_62e90919_operating_mode') }}"
      humidity: "{{ states('sensor.shcf_klimasensor_humidity') | float(999) }}"
      target: "{{ states('sensor.shcf_device_62e90919_target_humidity') | float(60) }}"
      threshold: "{{ states('sensor.shcf_device_62e90919_switch_on_threshold') | float(65) }}"
      timer_active: "{{ is_state('timer.shcf_device_62e90919_timed_operation', 'active') }}"
      timed_behavior: "{{ states('input_select.shcf_device_62e90919_timed_operation_behavior_on_target_reached') }}"
      duration: >
        {% set minutes = states('input_number.shcf_device_62e90919_timed_operation_duration') | int(60) %}
        {{ '%02d:%02d:%02d' | format(minutes // 60, minutes % 60, 0) }}

    action:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.platform == 'state'
                     and trigger.entity_id == 'input_select.shcf_device_62e90919_operating_mode'
                     and trigger.to_state is not none
                     and trigger.to_state.state == 'Timed Operation' }}
            sequence:
              - service: timer.start
                target:
                  entity_id: timer.shcf_device_62e90919_timed_operation
                data:
                  duration: "{{ duration }}"
              - service: switch.turn_on
                target:
                  entity_id: switch.shcf_zwischenstecker

          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.platform == 'state'
                     and trigger.entity_id == 'input_number.shcf_device_62e90919_timed_operation_duration'
                     and mode_state == 'Timed Operation'
                     and timer_active }}
            sequence:
              - service: timer.start
                target:
                  entity_id: timer.shcf_device_62e90919_timed_operation
                data:
                  duration: "{{ duration }}"

          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.platform == 'event'
                     and mode_state == 'Timed Operation' }}
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.shcf_device_62e90919_operating_mode
                data:
                  option: "Automatic"

          - conditions:
              - condition: template
                value_template: "{{ mode_state == 'Off' }}"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.shcf_zwischenstecker

          - conditions:
              - condition: template
                value_template: "{{ mode_state == 'Continuous Operation' }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.shcf_zwischenstecker

          - conditions:
              - condition: template
                value_template: >
                  {{ mode_state == 'Timed Operation'
                     and humidity <= target
                     and timed_behavior == 'Turn Off' }}
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.shcf_zwischenstecker
              - service: timer.cancel
                target:
                  entity_id: timer.shcf_device_62e90919_timed_operation
              - service: input_select.select_option
                target:
                  entity_id: input_select.shcf_device_62e90919_operating_mode
                data:
                  option: "Off"

          - conditions:
              - condition: template
                value_template: >
                  {{ mode_state == 'Timed Operation'
                     and humidity <= target
                     and timed_behavior == 'Switch to Automatic' }}
            sequence:
              - service: timer.cancel
                target:
                  entity_id: timer.shcf_device_62e90919_timed_operation
              - service: input_select.select_option
                target:
                  entity_id: input_select.shcf_device_62e90919_operating_mode
                data:
                  option: "Automatic"

          - conditions:
              - condition: template
                value_template: "{{ mode_state == 'Timed Operation' }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.shcf_zwischenstecker

          - conditions:
              - condition: template
                value_template: >
                  {{ mode_state == 'Automatic'
                     and humidity > threshold }}
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.shcf_zwischenstecker

          - conditions:
              - condition: template
                value_template: >
                  {{ mode_state == 'Automatic'
                     and humidity <= target }}
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.shcf_zwischenstecker