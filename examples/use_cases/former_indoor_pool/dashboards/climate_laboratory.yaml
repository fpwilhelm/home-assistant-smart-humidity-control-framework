              - entity: sensor.fitnessraum_klimasensor_humidity
                name: Relative Humidity
              - entity: sensor.shccf_lab_fitness_room_dew_point
                name: Dew Point
              - entity: sensor.shccf_lab_fitness_room_absolute_humidity
                name: Absolute Humidity

          - type: entities
