# ============================================================================
# SHCF Generated Device Package
# ============================================================================
# Device: Trotec TTK 171 ECO
# Device ID: device_62e90919
#
# Every generated Home Assistant object includes the Device ID.
# Do not edit this file manually.
# Edit the SHCF Device Profile instead and regenerate this package.
# ============================================================================

input_select:
  shcf_device_62e90919_operating_mode:
    name: SHCF device_62e90919 Operating Mode
    options:
      - "Off"
      - "Automatic"
      - "Continuous Operation"
      - "Timed Operation"
    initial: "Off"

  shcf_device_62e90919_humidity_profile:
    name: SHCF device_62e90919 Humidity Profile
    options:
      - "Living Area"
      - "Bedroom"
      - "Bathroom"
      - "Office"
      - "Laundry Room"
      - "Heated Basement"
      - "Unheated Basement"
      - "Storage Room"
      - "Archive"
      - "Technical Room"
    initial: "Living Area"

  shcf_device_62e90919_control_characteristic:
    name: SHCF device_62e90919 Control Characteristic
    options:
      - "Comfort"
      - "Standard"
      - "Conservative"
    initial: "Standard"

  shcf_device_62e90919_target_mode:
    name: SHCF device_62e90919 Target Mode
    options:
      - "Humidity Profile"
      - "Custom Target"
    initial: "Humidity Profile"

  shcf_device_62e90919_timed_operation_behavior_on_target_reached:
    name: SHCF device_62e90919 Timed Operation Behavior on Target Reached
    options:
      - "Continue Timed Operation"
      - "Switch to Automatic"
      - "Turn Off"
    initial: "Switch to Automatic"

  shcf_device_62e90919_timed_operation_behavior_on_timer_finished:
    name: SHCF device_62e90919 Timed Operation Behavior on Timer Finished
    options:
      - "Switch to Automatic"
      - "Turn Off"
    initial: "Switch to Automatic"

input_number:
  shcf_device_62e90919_custom_target_humidity:
    name: SHCF device_62e90919 Custom Target Humidity
    min: 35
    max: 75
    step: 1
    unit_of_measurement: "%"
    mode: slider
    initial: 60

  shcf_device_62e90919_timed_operation_duration:
    name: SHCF device_62e90919 Timed Operation Duration
    min: 5
    max: 720
    step: 5
    unit_of_measurement: "min"
    mode: box
    initial: 60

timer:
  shcf_device_62e90919_timed_operation:
    name: SHCF device_62e90919 Timed Operation
    duration: "00:30:00"
    restore: true
    icon: mdi:timer-outline

template:
  - sensor:
      - name: SHCF device_62e90919 Current Humidity
        unique_id: shcf_device_62e90919_current_humidity
        unit_of_measurement: "%"
        state: >
          {{ states('sensor.shcf_klimasensor_humidity') | float(0) | round(1) }}

      - name: SHCF device_62e90919 Current Temperature
        unique_id: shcf_device_62e90919_current_temperature
        unit_of_measurement: "°C"
        state: >
          {{ states('sensor.shcf_klimasensor_temperature') | float(0) | round(1) }}

      - name: SHCF device_62e90919 Target Humidity
        unique_id: shcf_device_62e90919_target_humidity
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set target_mode =
            states('input_select.shcf_device_62e90919_target_mode')
          %}

          {% if target_mode == 'Custom Target' %}
            {{
              states(
                'input_number.shcf_device_62e90919_custom_target_humidity'
              ) | float(60) | round(1)
            }}
          {% else %}
            {% set humidity_profile =
              states('input_select.shcf_device_62e90919_humidity_profile')
            %}
            {% set control_characteristic =
              states('input_select.shcf_device_62e90919_control_characteristic')
            %}

            {% set base_humidity = {
              'Living Area': 55,
              'Bedroom': 50,
              'Bathroom': 60,
              'Office': 55,
              'Laundry Room': 50,
              'Heated Basement': 55,
              'Unheated Basement': 60,
              'Storage Room': 60,
              'Archive': 50,
              'Technical Room': 60
            } %}

            {% set correction = {
              'Comfort': -5,
              'Standard': 0,
              'Conservative': 5
            } %}

            {{
              (
                base_humidity.get(humidity_profile, 55)
                + correction.get(control_characteristic, 0)
              ) | round(1)
            }}
          {% endif %}

      - name: SHCF device_62e90919 Hysteresis
        unique_id: shcf_device_62e90919_hysteresis
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set control_characteristic =
            states('input_select.shcf_device_62e90919_control_characteristic')
          %}

          {% set hysteresis_values = {
            'Comfort': 3,
            'Standard': 5,
            'Conservative': 7
          } %}

          {{
            hysteresis_values.get(control_characteristic, 5)
            | round(1)
          }}

      - name: SHCF device_62e90919 Switch-on Threshold
        unique_id: shcf_device_62e90919_switch_on_threshold
        unit_of_measurement: "%"
        state: >
          {% set target =
            states('sensor.shcf_device_62e90919_target_humidity') | float(60)
          %}
          {% set hysteresis =
            states('sensor.shcf_device_62e90919_hysteresis') | float(5)
          %}
          {{ (target + hysteresis) | round(1) }}

      - name: SHCF device_62e90919 Target Humidity Lower Limit
        unique_id: shcf_device_62e90919_target_humidity_lower_limit
        unit_of_measurement: "%"
        state: >
          {{
            states(
              'sensor.shcf_device_62e90919_target_humidity'
            ) | float(60) | round(1)
          }}

      - name: SHCF device_62e90919 Target Humidity Upper Limit
        unique_id: shcf_device_62e90919_target_humidity_upper_limit
        unit_of_measurement: "%"
        state: >
          {{
            states(
              'sensor.shcf_device_62e90919_switch_on_threshold'
            ) | float(65) | round(1)
          }}

      - name: SHCF device_62e90919 Target Humidity Deviation
        unique_id: shcf_device_62e90919_target_humidity_deviation
        unit_of_measurement: "%"
        state: >
          {% set current =
            states('sensor.shcf_klimasensor_humidity') | float(0)
          %}
          {% set target =
            states('sensor.shcf_device_62e90919_target_humidity') | float(60)
          %}
          {{ (current - target) | round(2) }}

      - name: SHCF device_62e90919 Indoor Dew Point
        unique_id: shcf_device_62e90919_indoor_dew_point
        unit_of_measurement: "°C"
        state: >
          {% set temperature =
            states('sensor.shcf_klimasensor_temperature') | float(0)
          %}
          {% set humidity =
            states('sensor.shcf_klimasensor_humidity') | float(0)
          %}
          {{
            (
              temperature - ((100 - humidity) / 5)
            ) | round(1)
          }}

      - name: SHCF device_62e90919 Dehumidification Demand
        unique_id: shcf_device_62e90919_dehumidification_demand
        state: >
          {% set humidity = states('sensor.shcf_klimasensor_humidity') | float(0) %}
          {% set target = states('sensor.shcf_device_62e90919_target_humidity') | float(60) %}
          {% set threshold = states('sensor.shcf_device_62e90919_switch_on_threshold') | float(65) %}
          {% if humidity <= target %}
            none
          {% elif humidity > threshold %}
            high
          {% else %}
            moderate
          {% endif %}

      - name: SHCF device_62e90919 Operating Status
        unique_id: shcf_device_62e90919_operating_status
        state: >
          {% set mode = states('input_select.shcf_device_62e90919_operating_mode') %}
          {% set switch_state = states('switch.shcf_zwischenstecker') %}
          {% if mode == 'Off' %}
            Off
          {% elif mode == 'Continuous Operation' %}
            Continuous Operation
          {% elif mode == 'Timed Operation' %}
            Timed Operation
          {% elif mode == 'Automatic' and switch_state == 'on' %}
            Automatic Dehumidifying
          {% elif mode == 'Automatic' %}
            Automatic Standby
          {% else %}
            Unknown
          {% endif %}

      - name: SHCF device_62e90919 Operating Status Display
        unique_id: shcf_device_62e90919_operating_status_display
        state: >
          {% set status = states('sensor.shcf_device_62e90919_operating_status') %}
          {% if status == 'Off' %}
            ⏹ Off
          {% elif status == 'Continuous Operation' %}
            🔁 Continuous Operation
          {% elif status == 'Timed Operation' %}
            ⏱ Timed Operation
          {% elif status == 'Automatic Dehumidifying' %}
            💧 Automatic Dehumidifying
          {% elif status == 'Automatic Standby' %}
            🟢 Automatic Standby
          {% else %}
            ❔ Unknown
          {% endif %}

      - name: SHCF device_62e90919 Recommendation
        unique_id: shcf_device_62e90919_recommendation
        state: >
          {% set demand = states('sensor.shcf_device_62e90919_dehumidification_demand') %}
          {% if demand == 'high' %}
            Dehumidification recommended.
          {% elif demand == 'moderate' %}
            Humidity is above target range.
          {% else %}
            Humidity is within target range.
          {% endif %}

automation:
  ###########################################################################
  # Timed Operation Lifecycle
  ###########################################################################

  - id: shcf_device_62e90919_timed_operation_lifecycle
    alias: SHCF device_62e90919 Timed Operation Lifecycle
    description: >
      Starts, updates, and cancels the timer when Timed Operation is entered,
      adjusted, or left.
    mode: restart

    trigger:
      - platform: state
        entity_id: input_select.shcf_device_62e90919_operating_mode
        id: operating_mode_changed

      - platform: state
        entity_id: input_number.shcf_device_62e90919_timed_operation_duration
        id: duration_changed

    variables:
      operating_mode: >
        {{ states(
          'input_select.shcf_device_62e90919_operating_mode'
        ) }}

      timer_active: >
        {{ is_state(
          'timer.shcf_device_62e90919_timed_operation',
          'active'
        ) }}

      duration: >
        {% set minutes =
          states(
            'input_number.shcf_device_62e90919_timed_operation_duration'
          ) | int(60)
        %}
        {{ '%02d:%02d:%02d' | format(
          minutes // 60,
          minutes % 60,
          0
        ) }}

    action:
      - choose:
          # Enter Timed Operation: start the timer.
          - conditions:
              - condition: trigger
                id: operating_mode_changed

              - condition: template
                value_template: >
                  {{ trigger.to_state is not none
                     and trigger.to_state.state == 'Timed Operation' }}
            sequence:
              - service: timer.start
                target:
                  entity_id: timer.shcf_device_62e90919_timed_operation
                data:
                  duration: "{{ duration }}"

          # Leave Timed Operation: cancel a still-running timer.
          - conditions:
              - condition: trigger
                id: operating_mode_changed

              - condition: template
                value_template: >
                  {{ trigger.from_state is not none
                     and trigger.from_state.state == 'Timed Operation'
                     and trigger.to_state is not none
                     and trigger.to_state.state != 'Timed Operation'
                     and timer_active }}
            sequence:
              - service: timer.cancel
                target:
                  entity_id: timer.shcf_device_62e90919_timed_operation

          # Update the running timer when its configured duration changes.
          - conditions:
              - condition: trigger
                id: duration_changed

              - condition: template
                value_template: >
                  {{ operating_mode == 'Timed Operation'
                     and timer_active }}
            sequence:
              - service: timer.start
                target:
                  entity_id: timer.shcf_device_62e90919_timed_operation
                data:
                  duration: "{{ duration }}"

  ###########################################################################
  # Timed Operation – Timer Finished
  ###########################################################################

  - id: shcf_device_62e90919_timed_operation_finished
    alias: SHCF device_62e90919 Timed Operation Finished
    description: >
      Applies the configured behavior after the timer expires normally.
    mode: single

    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.shcf_device_62e90919_timed_operation

    condition:
      - condition: state
        entity_id: input_select.shcf_device_62e90919_operating_mode
        state: "Timed Operation"

    variables:
      timer_finished_behavior: >
        {{ states(
          'input_select.shcf_device_62e90919_timed_operation_behavior_on_timer_finished'
        ) }}

    action:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ timer_finished_behavior == 'Turn Off' }}
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.shcf_zwischenstecker

              - service: input_select.select_option
                target:
                  entity_id: input_select.shcf_device_62e90919_operating_mode
                data:
                  option: "Off"

          - conditions:
              - condition: template
                value_template: >
                  {{ timer_finished_behavior == 'Switch to Automatic' }}
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.shcf_device_62e90919_operating_mode
                data:
                  option: "Automatic"

  ###########################################################################
  # Timed Operation – Target Reached
  ###########################################################################

  - id: shcf_device_62e90919_timed_operation_target_reached
    alias: SHCF device_62e90919 Timed Operation Target Reached
    description: >
      Applies the configured behavior when humidity crosses the target while
      Timed Operation is active.
    mode: restart

    trigger:
      - platform: state
        entity_id: sensor.shcf_klimasensor_humidity

    condition:
      - condition: state
        entity_id: input_select.shcf_device_62e90919_operating_mode
        state: "Timed Operation"

      - condition: state
        entity_id: timer.shcf_device_62e90919_timed_operation
        state: "active"

      - condition: template
        value_template: >
          {% set target =
            states(
              'sensor.shcf_device_62e90919_target_humidity'
            ) | float(none)
          %}

          {{ target is not none
             and trigger.from_state is not none
             and trigger.to_state is not none
             and trigger.from_state.state | is_number
             and trigger.to_state.state | is_number
             and trigger.from_state.state | float > target
             and trigger.to_state.state | float <= target }}

    variables:
      target_reached_behavior: >
        {{ states(
          'input_select.shcf_device_62e90919_timed_operation_behavior_on_target_reached'
        ) }}

    action:
      - choose:
          # Continue Timed Operation:
          # no action; timer and switching device continue running.

          - conditions:
              - condition: template
                value_template: >
                  {{ target_reached_behavior == 'Switch to Automatic' }}
            sequence:
              - service: timer.cancel
                target:
                  entity_id: timer.shcf_device_62e90919_timed_operation

              - service: input_select.select_option
                target:
                  entity_id: input_select.shcf_device_62e90919_operating_mode
                data:
                  option: "Automatic"

          - conditions:
              - condition: template
                value_template: >
                  {{ target_reached_behavior == 'Turn Off' }}
            sequence:
              - service: timer.cancel
                target:
                  entity_id: timer.shcf_device_62e90919_timed_operation

              - service: switch.turn_off
                target:
                  entity_id: switch.shcf_zwischenstecker

              - service: input_select.select_option
                target:
                  entity_id: input_select.shcf_device_62e90919_operating_mode
                data:
                  option: "Off"

  ###########################################################################
  # Central Controller
  ###########################################################################

  - id: shcf_device_62e90919_controller
    alias: SHCF device_62e90919 Controller
    description: >
      Central control logic for Off, Automatic, Continuous Operation,
      and Timed Operation.
    mode: restart

    trigger:
      - platform: time_pattern
        minutes: "/5"
        id: periodic_update

      - platform: state
        entity_id:
          - sensor.shcf_klimasensor_humidity
          - sensor.shcf_device_62e90919_target_humidity
          - sensor.shcf_device_62e90919_switch_on_threshold
          - input_select.shcf_device_62e90919_operating_mode
          - input_select.shcf_device_62e90919_humidity_profile
          - input_select.shcf_device_62e90919_control_characteristic
          - input_select.shcf_device_62e90919_target_mode
          - input_number.shcf_device_62e90919_custom_target_humidity
          - timer.shcf_device_62e90919_timed_operation
        id: state_changed

    variables:
      operating_mode: >
        {{ states(
          'input_select.shcf_device_62e90919_operating_mode'
        ) }}

      humidity: >
        {{ states('sensor.shcf_klimasensor_humidity') | float(999) }}

      target: >
        {{ states(
          'sensor.shcf_device_62e90919_target_humidity'
        ) | float(60) }}

      switch_on_threshold: >
        {{ states(
          'sensor.shcf_device_62e90919_switch_on_threshold'
        ) | float(65) }}

      timer_active: >
        {{ is_state(
          'timer.shcf_device_62e90919_timed_operation',
          'active'
        ) }}

      target_changed: >
        {{ trigger.platform == 'state'
           and trigger.entity_id in [
             'sensor.shcf_device_62e90919_target_humidity',
             'input_select.shcf_device_62e90919_humidity_profile',
             'input_select.shcf_device_62e90919_control_characteristic',
             'input_select.shcf_device_62e90919_target_mode',
             'input_number.shcf_device_62e90919_custom_target_humidity'
           ] }}

      automatic_activated: >
        {{ trigger.platform == 'state'
           and trigger.entity_id ==
             'input_select.shcf_device_62e90919_operating_mode'
           and trigger.to_state is not none
           and trigger.to_state.state == 'Automatic' }}

    action:
      - choose:
          # Off always switches the controlled device off.
          - conditions:
              - condition: template
                value_template: >
                  {{ operating_mode == 'Off' }}
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.shcf_zwischenstecker

          # Continuous Operation always switches the device on.
          - conditions:
              - condition: template
                value_template: >
                  {{ operating_mode == 'Continuous Operation' }}
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.shcf_zwischenstecker

          # Timed Operation runs while the timer is active.
          - conditions:
              - condition: template
                value_template: >
                  {{ operating_mode == 'Timed Operation'
                     and timer_active }}
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.shcf_zwischenstecker

          # Safety fallback:
          # do not leave the device running if Timed Operation has no active timer.
          - conditions:
              - condition: template
                value_template: >
                  {{ operating_mode == 'Timed Operation'
                     and not timer_active }}
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.shcf_zwischenstecker

          # When Automatic is selected, or its target changes, start immediately
          # if humidity is above the new target. This deliberately bypasses the
          # normal switch-on threshold for this one transition.
          - conditions:
              - condition: template
                value_template: >
                  {{ operating_mode == 'Automatic'
                     and (target_changed or automatic_activated)
                     and humidity > target }}
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.shcf_zwischenstecker

          # Normal Automatic switch-on condition.
          - conditions:
              - condition: template
                value_template: >
                  {{ operating_mode == 'Automatic'
                     and humidity > switch_on_threshold }}
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.shcf_zwischenstecker

          # Normal Automatic switch-off condition.
          - conditions:
              - condition: template
                value_template: >
                  {{ operating_mode == 'Automatic'
                     and humidity <= target }}
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.shcf_zwischenstecker