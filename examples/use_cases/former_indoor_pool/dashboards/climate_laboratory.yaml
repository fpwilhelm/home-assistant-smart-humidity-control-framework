            show_header_toggle: false
            entities:
              - entity: sensor.gw1200a_outdoor_temperature
                name: Temperature
              - entity: sensor.gw1200a_humidity
                name: Relative Humidity
              - entity: sensor.shccf_lab_outdoor_south_west_dew_point
                name: Dew Point
              - entity: sensor.shccf_lab_outdoor_south_west_absolute_humidity
                name: Absolute Humidity

          - type: entities
            title: Outdoor North-East
            show_header_toggle: false
            entities:
              - entity: sensor.gw1200a_temperature_1
                name: Temperature
              - entity: sensor.gw1200a_humidity_1
                name: Relative Humidity
              - entity: sensor.shccf_lab_outdoor_north_east_dew_point
                name: Dew Point
              - entity: sensor.shccf_lab_outdoor_north_east_absolute_humidity
                name: Absolute Humidity

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Humidity Differences
            heading_style: title
            icon: mdi:delta
          - type: entities
            title: Absolute Humidity Differences
            show_header_toggle: false
            entities:
              - entity: sensor.shccf_lab_fitness_room_minus_pool_absolute_humidity
                name: Fitness Room minus Pool
              - entity: sensor.shccf_lab_outdoor_south_west_minus_pool_absolute_humidity
                name: Outdoor South-West minus Pool
              - entity: sensor.shccf_lab_outdoor_north_east_minus_pool_absolute_humidity
                name: Outdoor North-East minus Pool
          - type: markdown
            content: |
              **Interpretation**

              A positive value means that the comparison location contains
              more water vapour than the former indoor pool.

              A negative value means that the comparison location is
              absolutely drier than the former indoor pool.

      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Climate History
            heading_style: title
            icon: mdi:chart-multiple

          - type: history-graph
            title: Temperature
            hours_to_show: 24
            logarithmic_scale: false
            entities:
              - entity: sensor.shcf_klimasensor_temperature
                name: Former Indoor Pool
              - entity: sensor.fitnessraum_klimasensor_temperature
                name: Fitness Room
              - entity: sensor.gw1200a_outdoor_temperature
                name: Outdoor South-West
              - entity: sensor.gw1200a_temperature_1
                name: Outdoor North-East

          - type: history-graph
            title: Relative Humidity
            hours_to_show: 24
            logarithmic_scale: false
            entities:
              - entity: sensor.shcf_klimasensor_humidity
                name: Former Indoor Pool
              - entity: sensor.fitnessraum_klimasensor_humidity
                name: Fitness Room
              - entity: sensor.gw1200a_humidity
                name: Outdoor South-West
              - entity: sensor.gw1200a_humidity_1
                name: Outdoor North-East

          - type: history-graph
            title: Dew Point
            hours_to_show: 24
            logarithmic_scale: false
            entities:
              - entity: sensor.shccf_lab_pool_dew_point
                name: Former Indoor Pool
              - entity: sensor.shccf_lab_fitness_room_dew_point
                name: Fitness Room
              - entity: sensor.shccf_lab_outdoor_south_west_dew_point
                name: Outdoor South-West
              - entity: sensor.shccf_lab_outdoor_north_east_dew_point
                name: Outdoor North-East

          - type: history-graph
            title: Absolute Humidity
            hours_to_show: 24
            logarithmic_scale: false
            entities:
              - entity: sensor.shccf_lab_pool_absolute_humidity
                name: Former Indoor Pool
              - entity: sensor.shccf_lab_fitness_room_absolute_humidity
                name: Fitness Room
              - entity: sensor.shccf_lab_outdoor_south_west_absolute_humidity
                name: Outdoor South-West
              - entity: sensor.shccf_lab_outdoor_north_east_absolute_humidity
                name: Outdoor North-East

          - type: history-graph
            title: Absolute Humidity Differences
            hours_to_show: 24
            logarithmic_scale: false
            entities:
              - entity: sensor.shccf_lab_fitness_room_minus_pool_absolute_humidity
                name: Fitness Room minus Pool
              - entity: sensor.shccf_lab_outdoor_south_west_minus_pool_absolute_humidity
                name: South-West minus Pool
              - entity: sensor.shccf_lab_outdoor_north_east_minus_pool_absolute_humidity
                name: North-East minus Pool

    cards: []

  - title: Analytics
    path: analytics
    icon: mdi:chart-box-outline
    type: sections
    max_columns: 4

    header:
      card:
        type: markdown
        text_only: true
        content: |
          # Analytics
          Runtime, energy and climate stability
      layout: start
      badges_position: bottom
      badges_wrap: wrap

    badges:
      - type: entity
        entity: sensor.shccf_lab_trotec_runtime_today
        name: Runtime
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: sensor.shccf_lab_trotec_energy_today
        name: Energy
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: sensor.shccf_lab_pool_time_above_60_today
        name: Exposure
        show_name: true
        show_state: true
        show_icon: true

    sections:
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Today's Analytics
            heading_style: title
            icon: mdi:clock-check-outline

          - type: entities
            title: Today's Operation
            show_header_toggle: false
            entities:
              - entity: sensor.shcf_device_62e90919_operating_status_display
